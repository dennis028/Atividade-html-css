<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="text/javascript" src="./index.js" defer=""></script>
    <link rel="stylesheet" href="./index.css">
  </head>

  <body>
    <img class="logo" src="https://i.ibb.co/WWFZ5P0w/Design-sem-nome-4.png" alt="Incode">

    <h1>Bem Vindo ao</h1>
    <h1>Incode Tech School</h1><br>

    <main class="container">
      <!---Botão google-->
      <div>
        <h2 class="titulo2">Cadastre-se</h2>
        <form>
          <div class="button-google">
            <button type="submit" class="button-g"><img class="img-logo" src="https://agenciapnz.com/wp-content/uploads/Logo-Google-G.png" alt="Google">Continuar com o Google</button>
          </div>
          <!---Botão twitter-->
          <div class="button-twitter">
            <button type="submit" class="button-t"><img class="img-logo" src="https://img.magnific.com/vetores-premium/twitter-vetor-logotipo-logotipo-vetor-midia-social_901408-401.jpg?semt=ais_hybrid&amp;w=740&amp;q=80" alt="Twitter">Continuar com o Twitter</button>
          </div>

          <h2 class="titulo3">Faça Login</h2>

          <!---Form email-->
          <h3 class="titulo3-1">E-mail</h3>
          <div class="barra">
            <input class="caixa-email" placeholder="Digite seu e-mail" type="email" name="email">
          </div>
          <!---Form senha-->
          <h3 class="titulo3-2">Senha</h3>
          <div class="barra">
            <input class="caixa-senha" placeholder="Digigte sua senha" type="password" name="senha">
          </div>
          <!---Botão entrar-->
          <div class="entrar">
            <button class="enter" type="submit">Entrar</button>
          </div>
        </form>
      </div>
    </main>

  </body>

</html>
